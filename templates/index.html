<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏数据分析大屏</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        .card {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #334155;
        }
        .stat-card {
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #38bdf8;
            margin: 10px 0;
        }
        .stat-label {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .total-label {
            color: #64748b;
            font-size: 0.75rem;
            margin-top: 5px;
            border-top: 1px solid #334155;
            padding-top: 5px;
        }
        .chart-card {
            grid-column: span 2;
            height: 400px;
        }
        .sql-card {
            grid-column: span 4;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #levelChart {
            width: 100%;
            height: 100%;
        }
        textarea {
            width: 100%;
            height: 100px;
            background-color: #0f172a;
            color: #10b981;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            resize: vertical;
        }
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2563eb;
        }
        .sql-result {
            margin-top: 10px;
            max-height: 300px;
            overflow: auto;
            background-color: #0f172a;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid #334155;
        }
        th {
            background-color: #1e293b;
            color: #94a3b8;
            position: sticky;
            top: 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>游戏实时数据分析大屏</h1>
    </div>

    <div class="dashboard">
        <!-- 统计卡片 -->
        <div class="card stat-card">
            <div class="stat-label">今日活跃用户 (DAU)</div>
            <div id="dauValue" class="stat-value">加载中...</div>
            <div id="totalPlayers" class="total-label">总用户数: --</div>
        </div>
        <div class="card stat-card">
            <div class="stat-label">今日对局场次</div>
            <div id="matchValue" class="stat-value">加载中...</div>
            <div id="totalMatch" class="total-label">总对局数: --</div>
        </div>
        <div class="card stat-card">
            <div class="stat-label">今日皮肤销量</div>
            <div id="skinCountValue" class="stat-value">加载中...</div>
            <div id="totalSkinCount" class="total-label">总销量: --</div>
        </div>
        <div class="card stat-card">
            <div class="stat-label">今日销售额</div>
            <div id="revenueValue" class="stat-value">加载中...</div>
            <div id="totalRevenue" class="total-label">总额: --</div>
        </div>

        <!-- 图表 -->
        <div class="card chart-card">
            <h3>玩家段位分布</h3>
            <div id="levelChart"></div>
        </div>
        
        <div class="card chart-card">
            <h3>系统状态</h3>
            <p style="color: #94a3b8;">数据每 30 秒自动刷新一次。</p>
            <p id="updateTime" style="font-size: 0.8rem; color: #64748b;"></p>
        </div>

        <!-- SQL 控制台 -->
        <div class="card sql-card">
            <h3>远程 SQL 控制台</h3>
            <textarea id="sqlInput" placeholder="请输入 ClickHouse SQL 语句... (例如: select * from game_events limit 10)"></textarea>
            <div>
                <button onclick="executeSQL()">执行查询</button>
            </div>
            <div id="sqlResultContainer" class="sql-result">
                <!-- 结果表格将显示在这里 -->
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            try {
                // 获取概览数据
                const overviewRes = await fetch('/api/overview');
                const overviewData = await overviewRes.json();
                
                if (overviewData.code === 200) {
                    const data = overviewData.data;
                    // 今日数据
                    document.getElementById('dauValue').innerText = data.today.dau.toLocaleString();
                    document.getElementById('matchValue').innerText = data.today.match.toLocaleString();
                    document.getElementById('skinCountValue').innerText = data.today.skin_sell_count.toLocaleString();
                    document.getElementById('revenueValue').innerText = '¥' + data.today.revenue.toLocaleString();
                    
                    // 总计数据
                    document.getElementById('totalPlayers').innerText = '总用户数: ' + data.total.players.toLocaleString();
                    document.getElementById('totalMatch').innerText = '总对局数: ' + data.total.match.toLocaleString();
                    document.getElementById('totalSkinCount').innerText = '总销量: ' + data.total.skin_sell_count.toLocaleString();
                    document.getElementById('totalRevenue').innerText = '总额: ¥' + data.total.revenue.toLocaleString();
                }

                // 获取段位分布数据
                const levelRes = await fetch('/api/level-distribution');
                const levelData = await levelRes.json();
                
                if (levelData.code === 200) {
                    updateLevelChart(levelData.data.level_distribution);
                }

                document.getElementById('updateTime').innerText = '最后更新时间: ' + new Date().toLocaleTimeString();
            } catch (error) {
                console.error('获取数据失败:', error);
            }
        }

        let levelChart = null;

        function updateLevelChart(data) {
            if (!levelChart) {
                levelChart = echarts.init(document.getElementById('levelChart'), 'dark');
            }

            const chartData = data.map(item => ({
                name: item[0],
                value: item[1]
            }));

            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    formatter: '{b}: {c} ({d}%)'
                },
                series: [
                    {
                        name: '段位分布',
                        type: 'pie',
                        radius: ['40%', '70%'],
                        avoidLabelOverlap: false,
                        itemStyle: {
                            borderRadius: 10,
                            borderColor: '#1e293b',
                            borderWidth: 2
                        },
                        label: {
                            show: true,
                            formatter: '{b}: {c}'
                        },
                        emphasis: {
                            label: {
                                show: true,
                                fontSize: '16',
                                fontWeight: 'bold'
                            }
                        },
                        data: chartData
                    }
                ]
            };

            levelChart.setOption(option);
        }

        async function executeSQL() {
            const sql = document.getElementById('sqlInput').value.trim();
            const container = document.getElementById('sqlResultContainer');
            
            if (!sql) return;
            
            container.innerHTML = '<p style="padding: 10px;">执行中...</p>';
            
            try {
                const response = await fetch('/api/query-sql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql })
                });
                const result = await response.json();
                
                if (result.code === 200) {
                    if (result.data.rows.length === 0) {
                        container.innerHTML = '<p style="padding: 10px;">查询成功，但没有返回数据。</p>';
                        return;
                    }
                    
                    let html = '<table><thead><tr>';
                    result.data.columns.forEach(col => {
                        html += `<th>${col}</th>`;
                    });
                    html += '</tr></thead><tbody>';
                    
                    result.data.rows.forEach(row => {
                        html += '<tr>';
                        row.forEach(cell => {
                            html += `<td>${cell !== null ? cell : 'NULL'}</td>`;
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';
                    container.innerHTML = html;
                } else {
                    container.innerHTML = `<p style="padding: 10px; color: #ef4444;">错误: ${result.msg}</p>`;
                }
            } catch (error) {
                container.innerHTML = `<p style="padding: 10px; color: #ef4444;">请求失败: ${error.message}</p>`;
            }
        }

        // 初始加载
        fetchData();
        // 定时刷新
        setInterval(fetchData, 30000);

        // 响应式图表
        window.addEventListener('resize', () => {
            levelChart && levelChart.resize();
        });
    </script>
</body>
</html>
